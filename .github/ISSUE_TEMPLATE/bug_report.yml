name: Bug report
description: Report a reproducible problem in DJAMP PRO
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug in DJAMP PRO."
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed private machine details (paths, certs, secrets) from logs.
          required: true
  - type: input
    id: version
    attributes:
      label: DJAMP PRO version
      placeholder: v1.2.0 or commit SHA
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 14.6
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Add project
        2. Start project
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste relevant controller/proxy logs. Redact private paths and hostnames if needed.
    validations:
      required: false
  - type: textarea
    id: diagnostic
    attributes:
      label: Environment details
      placeholder: |
        Runtime mode: uv / conda / system / custom
        Project domain: *.test / localhost / other
        Database type: postgres / mysql / none
    validations:
      required: false
