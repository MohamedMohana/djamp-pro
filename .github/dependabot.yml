      interval: weekly
    open-pull-requests-limit: 2
    labels: ["dependencies"]
  - package-ecosystem: "pip"
    directory: "/services/controller"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels: ["dependencies"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels: ["dependencies"]
