name-template: 'DJAMP PRO $RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
no-changes-template: '- No user-facing changes in this cycle.'
version-resolver:
  major:
    labels: [breaking]
  minor:
    labels: [feature, enhancement]
  patch:
    labels: [bug, fix, documentation, chore]
  default: patch
categories:
  - title: 'Features'
    labels: [feature, enhancement]
  - title: 'Fixes'
    labels: [bug, fix]
  - title: 'Docs and Maintenance'
    labels: [documentation, chore]
template: |
  ## What's Changed

  $CHANGES

  ## Notes

  - macOS is the primary supported platform.
  - DJAMP PRO is intended for local development only.
