name: Dependabot Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-review:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2

      - name: Approve vetted Dependabot PRs
        if: >
          steps.dependabot-metadata.outputs.maintainer-changes == 'false' &&
          (
            steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.dependabot-metadata.outputs.alert-state == 'OPEN'
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          current_decision="$(gh pr view "$PR_URL" --json reviewDecision --jq '.reviewDecision // ""')"
          if [ "$current_decision" = "APPROVED" ]; then
            echo "PR already approved."
            exit 0
          fi

          gh pr review --approve "$PR_URL" --body "Auto-approved: Dependabot patch/security update with no maintainer changes."
