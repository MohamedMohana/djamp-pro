name: Mark stale issues and PRs

on:
  schedule:
    - cron: '30 1 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: "This issue is marked stale due to inactivity. If this is still relevant, comment and it will stay open."
          stale-pr-message: "This PR is marked stale due to inactivity. If this is still relevant, comment and it will stay open."
          days-before-stale: 45
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "security,priority:p0,priority:p1,release,pinned"
          exempt-pr-labels: "security,priority:p0,priority:p1,pinned"
