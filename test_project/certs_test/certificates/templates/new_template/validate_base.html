{% load static %}

<!DOCTYPE html>
<html lang="ar" class="light-style layout-navbar-fixed layout-menu-fixed" dir="rtl" data-theme="theme-default"
      data-assets-path="{% static 'assets' %}" data-template="vertical-menu-template">
<!-- BEGIN: Head-->

<head>
    <link rel="icon" type="image/x-icon" href="https://myfiles.kku.edu.sa/public/kkuLogo/kku-logo-ico.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.5.1/dropzone.css">

    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=0,minimal-ui">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <meta name="author" content="">
    <title>{% block title %}Certification{% endblock %}</title>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'validation/style.css' %}">
    
    <!-- Google Fonts -> IBM Plex Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Global Font Override -->
    <style>
        * {
            font-family: 'IBM Plex Sans', 'IBM Plex Sans Arabic', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
        }
    </style>

    <!-- Accessibility Tools CSS start -->
    <link rel="stylesheet" media="all" href="https://muneer.cx/static/v1/css/muneer.min.css"/>
    <!-- Accessibility Tools CSS end -->
</head>
<!-- END: Head-->

<!-- BEGIN: Body-->

<body class="cert-body" onclick="window.location.href='https://certs.kku.edu.sa/';" style="cursor: pointer;">
    {% block header %}
    <header class="cert-header header">
        <img src="{% static 'validation/svgs/kku-logo.svg' %}" alt="Kku" />
    </header>
    {% endblock %}

    <main class="cert-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    {% block footer %}
    <footer class="content-footer footer bg-footer-theme cert-footer">
        <div class="container-xxl">
            <div class="footer-container d-flex align-items-center justify-content-between py-2 flex-md-row flex-column">
                <div>
                    <p class="clearfix mb-0">
                        <span class="float-md-left d-block d-md-inline-block mt-25">
                            &copy;
                            <script>
                                document.write(new Date().getFullYear());
                            </script>
                            <a class="ml-25" href="https://www.kku.edu.sa/" target="_blank">جامعة الملك خالد</a>
                            <span class="d-none d-sm-inline-block">, جميع الحقوق محفوظة</span>
                        </span>
                    </p>
                </div>
            </div>
        </div>
    </footer>
    {% endblock %}
    
    <!-- Accessibility Tools Script Start -->
    <script src="https://muneer.cx/v1/js/muneer.min.js?cid=d8acf42d-4de4-46c5-99c0-653c8bc029b1"></script>
    <!-- Accessibility Tools Script End -->

</body>
<!-- END: Body-->

</html>
