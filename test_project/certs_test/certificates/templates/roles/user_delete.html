{% extends 'new_template/base.html' %}

{% block content %}
<div class="container-xxl flex-grow-1 container-p-y">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">{{ page_subtitle }}</h5>
                </div>
                <div class="card-body">
                    <div class="alert alert-warning" role="alert">
                        <h6 class="alert-heading mb-1">تأكيد الحذف</h6>
                        <p class="mb-0">
                            هل أنت متأكد من حذف المستخدم "{{ profile.full_name }}"؟
                            <br>
                            <strong>تنبيه:</strong> سيتم حذف جميع البيانات المرتبطة بهذا المستخدم.
                        </p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mt-3">
                            <button type="submit" class="btn btn-danger me-2">نعم، احذف</button>
                            <a href="{% url 'user_list' %}" class="btn btn-label-secondary">إلغاء</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
